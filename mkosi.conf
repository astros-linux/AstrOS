[Distribution]
Distribution=arch
Architecture=x86-64

[Build]
ToolsTree=default
CacheDirectory=mkosi.cache
Incremental=yes

[Content]
Bootable=yes
KernelCommandLine=
  mount.usr=dissect
  rw

[Output]
OutputDirectory=mkosi.output
Format=disk
ImageId=astrOS
Output=%i_%v_%a
SplitArtifacts=uki,partitions
