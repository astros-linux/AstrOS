# copy the most important stuff from /usr/share/factory/etc to /etc 
# vconsole disabled as systemd-firstboot will generate it

L /etc/os-release - - - - ../usr/lib/os-release
L+ /etc/mtab - - - - ../proc/self/mounts

# Uncomment for firstboot to ask
C! /etc/locale.conf - - - -

C! /etc/nsswitch.conf - - - -
#C! /etc/vconsole.conf - - - -
C! /etc/pam.d - - - -
C! /etc/issue - - - -
C! /etc/sudoers - - - -

L /etc/ssl - - - -
L? /etc/tuned - - - -
L? /etc/greetd - - - -
