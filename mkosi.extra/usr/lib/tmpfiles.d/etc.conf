# copy the most important stuff from /usr/share/factory/etc to /etc 
# locale and vconsole disabled as systemd-firstboot will generate those

L /etc/os-release - - - - ../usr/lib/os-release
L+ /etc/mtab - - - - ../proc/self/mounts
#C! /etc/locale.conf - - - -
C! /etc/nsswitch.conf - - - -
#C! /etc/vconsole.conf - - - -
C! /etc/pam.d - - - -
C! /etc/issue - - - -
C! /etc/sudoers - - - -
