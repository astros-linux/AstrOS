# copy the most important stuff from /usr/share/factory/etc to /etc
# vconsole disabled as systemd-firstboot will generate it

L  /etc/os-release - - - - ../usr/lib/os-release
L+ /etc/mtab       - - - - ../proc/self/mounts

L? /etc/locale.conf
#L /etc/vconsole.conf
L  /etc/pam.d
L  /etc/issue

# user creation
L  /etc/sudoers
L  /etc/login.defs
L  /etc/default

# shell etc
L  /etc/nsswitch.conf
L  /etc/profile
L  /etc/profile.d
L? /etc/bash.bashrc
L? /etc/bash.bash_logout
L? /etc/bash_completion.d
L  /etc/security
L  /etc/environment

# certs (flatpak fails without it)
L  /etc/ssl
L? /etc/ca-certificates

# cosmic greeter needs /etc/xdg for autostart
L  /etc/xdg

L  /etc/fonts
L  /etc/man_db.conf
L  /etc/ld.so.conf
L  /etc/ld.so.conf.d
L? /etc/services
L? /etc/skel
L? /etc/tuned
L? /etc/greetd

# podman
L? /etc/containers

# printing
L? /etc/avahi
L? /etc/cups
