# populate /etc from the read-only factory image.
# https://www.freedesktop.org/software/systemd/man/latest/tmpfiles.d.html?

# system identity
L  /etc/os-release - - - - ../usr/lib/os-release
L+ /etc/mtab       - - - - ../proc/self/mounts
L  /etc/issue

# locale
L? /etc/locale.conf

# user creation and authentication
L  /etc/pam.d
L  /etc/security
L  /etc/login.defs
L  /etc/sudoers
L? /etc/skel
L  /etc/default

# shell
L  /etc/profile
L  /etc/profile.d
L  /etc/environment
L? /etc/bash.bashrc
L? /etc/bash.bash_logout
L? /etc/bash_completion.d
L? /etc/conf.d

# name resolution
L  /etc/nsswitch.conf
L? /etc/services
L? /etc/protocols

# certs (flatpak fails without it)
L  /etc/ssl
L? /etc/ca-certificates

# dynamic linker
L  /etc/ld.so.conf
C  /etc/ld.so.conf.d

# cosmic greeter (needs /etc/xdg for autostart)
L  /etc/xdg
L? /etc/greetd

# fonts and man pages
L  /etc/fonts
L  /etc/man_db.conf

# podman
L? /etc/containers

# tuning profiles
L? /etc/tuned

# printing. C instead of L for cups to avoid Read-only error
L? /etc/avahi
C  /etc/cups
